<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
    <title>Auto Play Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            position: fixed;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
        }

        /* Password Screen */
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.5s ease;
        }

        .password-screen.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .password-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .password-box h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .password-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.5;
        }

        .password-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .password-box input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .password-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .password-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .password-error {
            color: #f44336;
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
        }

        .heart-icon {
            color: #e91e63;
            font-size: 24px;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1);
            }
        }

        #videoContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            background: #000;
            display: block;
        }

        /* Mobile specific fixes */
        @media (max-width: 768px) {
            video {
                width: 100vw;
                height: 100vh;
                object-fit: contain;
            }
        }

        .play-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .play-overlay.hidden {
            display: none;
        }

        .play-button {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: #000;
            animation: pulse 2s infinite;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }
        }

        .play-text {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .password-box {
                padding: 30px 20px;
            }
            
            .password-box h2 {
                font-size: 24px;
            }
            
            .password-box p {
                font-size: 14px;
            }
            
            .lock-icon {
                font-size: 50px;
            }
            
            .play-button {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
            
            .play-text {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .password-box {
                padding: 25px 15px;
            }
            
            .password-box h2 {
                font-size: 20px;
            }
            
            .password-box input,
            .password-box button {
                font-size: 16px;
                padding: 12px;
            }
            
            .lock-icon {
                font-size: 45px;
            }
            
            .play-button {
                width: 80px;
                height: 80px;
                font-size: 35px;
            }
            
            .play-text {
                font-size: 16px;
            }
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 18px;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div class="password-screen" id="passwordScreen">
        <div class="password-box">
            <div class="lock-icon">🔒</div>
            <h2>This is for You <span class="heart-icon">❤️</span></h2>
            <p>Tumhare liye kuch special hai...<br>Password dalo aur dekho!</p>
            <input type="password" id="passwordInput" placeholder="Enter Password" onkeypress="if(event.key==='Enter') checkPassword()">
            <button onclick="checkPassword()">Unlock</button>
            <p class="password-error" id="passwordError"></p>
        </div>
    </div>

    <div id="videoContainer">
        <!-- 
            ================================================
            VIDEO FILE KA NAAM YAHAN CHANGE KARO (Line 93)
            ================================================
            
            Default: video.mp4
            
            Agar aapki video ka naam alag hai:
            - "myvideo.mp4" hai to: src="myvideo.mp4"
            - "demo.mp4" hai to: src="demo.mp4"
            - "product.mp4" hai to: src="product.mp4"
            
            ================================================
        -->
        <video id="myVideo" controls loop playsinline preload="auto" webkit-playsinline x5-playsinline>
            <source src="video.mp4" type="video/mp4">
            <source src="video.webm" type="video/webm">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="play-overlay" id="playOverlay">
        <div class="play-button">▶</div>
        <div class="play-text">Click to Play Video</div>
    </div>

    <div class="error-message" id="errorMessage">
        Video load nahi ho raha! File check karein.
    </div>

    <script>
        // ================================================
        // PASSWORD YAHAN SET KARO
        // ================================================
        const correctPassword = "1234"; // Password: 1234
        // ================================================

        const video = document.getElementById('myVideo');
        const overlay = document.getElementById('playOverlay');
        const errorMessage = document.getElementById('errorMessage');
        const passwordScreen = document.getElementById('passwordScreen');
        const passwordInput = document.getElementById('passwordInput');
        const passwordError = document.getElementById('passwordError');
        let playAttempted = false;

        // Check password function
        function checkPassword() {
            const enteredPassword = passwordInput.value;
            
            if (enteredPassword === correctPassword) {
                // Correct password - hide password screen
                passwordScreen.classList.add('hidden');
                passwordInput.value = '';
                passwordError.textContent = '';
                
                // Start video after password
                setTimeout(() => {
                    attemptPlay();
                }, 500);
            } else {
                // Wrong password
                passwordError.textContent = '❌ Wrong password! Try again...';
                passwordInput.value = '';
                passwordInput.style.borderColor = '#f44336';
                
                // Shake animation
                passwordInput.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    passwordInput.style.animation = '';
                    passwordInput.style.borderColor = '#667eea';
                }, 500);
            }
        }

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // Function to attempt video play
        function attemptPlay() {
            // DON'T mute - keep sound ON
            video.muted = false;
            video.volume = 1.0; // Full volume
            
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // Autoplay started successfully
                    console.log('Video playing with sound');
                    overlay.classList.add('hidden');
                    playAttempted = true;
                }).catch(error => {
                    // Autoplay was prevented - try with mute
                    console.log('Autoplay prevented, trying muted:', error);
                    video.muted = true;
                    video.play().then(() => {
                        overlay.style.display = 'flex';
                        playAttempted = false;
                    });
                });
            }
        }

        // Try to play on page load
        window.addEventListener('load', function() {
            console.log('Page loaded, attempting autoplay...');
            
            // Wait a bit for video to load
            setTimeout(() => {
                attemptPlay();
            }, 500);
        });

        // Play on click
        overlay.addEventListener('click', function() {
            console.log('User clicked play button');
            video.muted = false; // Unmute
            video.volume = 1.0; // Full volume
            video.play().then(() => {
                overlay.classList.add('hidden');
            }).catch(error => {
                console.error('Play error:', error);
                errorMessage.style.display = 'block';
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            });
        });

        // Hide overlay when video starts playing
        video.addEventListener('playing', function() {
            console.log('Video is playing');
            overlay.classList.add('hidden');
        });

        // Show error if video fails to load
        video.addEventListener('error', function(e) {
            console.error('Video error:', e);
            errorMessage.textContent = 'Video file nahi mili! "video.mp4" upload karein.';
            errorMessage.style.display = 'block';
            
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        });

        // Log when video can play
        video.addEventListener('canplay', function() {
            console.log('Video can play');
        });

        // Try to play on any user interaction
        document.addEventListener('click', function() {
            if (!playAttempted && video.paused) {
                attemptPlay();
            }
        }, { once: true });

        // Mobile touch support
        document.addEventListener('touchstart', function() {
            if (!playAttempted && video.paused) {
                attemptPlay();
            }
        }, { once: true });
    </script>
</body>
</html>
