<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Play Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        .play-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-button {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: #000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body>
    <!-- 
        ================================================
        IMPORTANT: APNI VIDEO FILE KA NAAM YAHAN DALEIN
        ================================================
        
        Line 67 par "video.mp4" ko apni video file ke naam se replace karo
        
        Example:
        - Agar video ka naam "myvideo.mp4" hai to: src="myvideo.mp4"
        - Agar video ka naam "demo.mp4" hai to: src="demo.mp4"
        
        ================================================
    -->
    
    <video id="myVideo" loop playsinline>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="play-overlay" id="playOverlay">
        <div class="play-button">▶</div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const overlay = document.getElementById('playOverlay');

        // Try auto-play on page load
        window.addEventListener('load', function() {
            video.muted = true; // Muted for autoplay policy
            video.play().then(() => {
                // Success - hide overlay
                overlay.classList.add('hidden');
            }).catch(() => {
                // Autoplay blocked - show play button
                overlay.style.display = 'flex';
            });
        });

        // Play on click if autoplay failed
        overlay.addEventListener('click', function() {
            video.muted = false; // Unmute on user interaction
            video.play();
            overlay.classList.add('hidden');
        });

        // Auto-hide overlay when video plays
        video.addEventListener('play', function() {
            overlay.classList.add('hidden');
        });
    </script>
</body>
</html>
